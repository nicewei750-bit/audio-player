<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地小说音频播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #18181A;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            background-color: #18181A;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        main {
            flex: 1;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .icon-circle {
            width: 120px;
            height: 120px;
            background-color: #2C2C2E;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        .icon-circle svg {
            width: 40px;
            height: 40px;
            fill: #007AFF;
        }
        h2 {
            font-size: 22px;
            margin-bottom: 12px;
        }
        .desc {
            color: #8E8E93;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .btn {
            background-color: #007AFF;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 32px;
            transition: all 0.2s;
        }
        .btn:hover {
            background-color: #005FCC;
        }
        .drop-area {
            border: 2px dashed #3A3A3C;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            color: #8E8E93;
            transition: all 0.3s;
        }
        .drop-area.active {
            border-color: #007AFF;
            background-color: rgba(0, 122, 255, 0.1);
        }
        footer {
            background-color: #1C1C1E;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            padding-bottom: env(safe-area-inset-bottom, 12px);
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8E8E93;
            font-size: 12px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .tab-item.active {
            color: #007AFF;
        }
        .tab-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            fill: currentColor;
        }
        .page {
            display: none;
            width: 100%;
        }
        .page.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #playlist-page, #player-page {
            display: none;
            width: 100%;
        }
        #playlist-page.active, #player-page.active {
            display: block;
        }
        .playlist-item {
            background-color: #2C2C2E;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            width: 100%;
            max-width: 400px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .player-controls {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }
        .control-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
        }
        .control-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }
        .hidden-input {
            display: none;
        }
    </style>
</head>
<body>
    <header>本地小说音频</header>

    <main>
        <!-- 文件页 -->
        <div id="file-page" class="page active">
            <div class="icon-circle">
                <svg viewBox="0 0 24 24">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
            </div>
            <h2>导入音频文件</h2>
            <p class="desc">点击下方按钮选择本地音频文件，或拖拽文件到此处</p>
            <button class="btn" id="select-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                </svg>
                选择文件
            </button>
            <div class="drop-area" id="drop-area">拖拽音频文件到此处</div>
            <input type="file" id="file-input" class="hidden-input" accept="audio/*" multiple>
        </div>

        <!-- 播放页 -->
        <div id="player-page" class="page">
            <div class="icon-circle">
                <svg viewBox="0 0 24 24">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
            </div>
            <h2 id="now-playing">未播放任何文件</h2>
            <div class="player-controls">
                <button class="control-btn" id="prev-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </button>
                <button class="control-btn" id="play-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </button>
                <button class="control-btn" id="next-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                    </svg>
                </button>
            </div>
            <audio id="audio-player" controls style="margin-top: 30px; width: 100%; max-width: 400px;">
        </div>

        <!-- 列表页 -->
        <div id="playlist-page" class="page">
            <h2>播放列表</h2>
            <div id="playlist"></div>
        </div>
    </main>

    <footer>
        <div class="tab-item active" data-page="file">
            <svg viewBox="0 0 24 24">
                <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
            </svg>
            文件
        </div>
        <div class="tab-item" data-page="player">
            <svg viewBox="0 0 24 24">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
            播放
        </div>
        <div class="tab-item" data-page="playlist">
            <svg viewBox="0 0 24 24">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
            列表
        </div>
    </footer>

    <script>
        // 元素获取
        const tabItems = document.querySelectorAll('.tab-item');
        const pages = {
            file: document.getElementById('file-page'),
            player: document.getElementById('player-page'),
            playlist: document.getElementById('playlist-page')
        };
        const selectBtn = document.getElementById('select-btn');
        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');
        const playlistEl = document.getElementById('playlist');
        const audioPlayer = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const nowPlayingEl = document.getElementById('now-playing');

        let playlist = [];
        let currentIndex = 0;

        // 标签切换
        tabItems.forEach(tab => {
            tab.addEventListener('click', () => {
                const pageName = tab.dataset.page;
                tabItems.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                Object.values(pages).forEach(p => p.classList.remove('active'));
                pages[pageName].classList.add('active');
            });
        });

        // 选择文件
        selectBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        // 拖拽上传
        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.classList.add('active');
        });
        dropArea.addEventListener('dragleave', () => dropArea.classList.remove('active'));
        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.classList.remove('active');
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            for (const file of files) {
                if (file.type.startsWith('audio/')) {
                    playlist.push(file);
                    renderPlaylist();
                }
            }
        }

        function renderPlaylist() {
            playlistEl.innerHTML = '';
            playlist.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'playlist-item';
                item.innerHTML = `
                    <span>${file.name}</span>
                    <button data-index="${index}" class="play-item-btn">播放</button>
                `;
                playlistEl.appendChild(item);
            });

            document.querySelectorAll('.play-item-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    playAudio(idx);
                });
            });
        }

        function playAudio(index) {
            if (playlist.length === 0) return;
            currentIndex = index;
            const file = playlist[index];
            const url = URL.createObjectURL(file);
            audioPlayer.src = url;
            audioPlayer.play();
            nowPlayingEl.textContent = file.name;
            // 切到播放页
            tabItems.forEach(t => t.classList.remove('active'));
            document.querySelector('[data-page="player"]').classList.add('active');
            Object.values(pages).forEach(p => p.classList.remove('active'));
            pages.player.classList.add('active');
        }

        // 播放/暂停按钮
        playBtn.addEventListener('click', () => {
            if (audioPlayer.paused) {
                audioPlayer.play();
            } else {
                audioPlayer.pause();
            }
        });
    </script>
</body>
</html>
