<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：让 Safari 进入独立 App 模式 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="播放器">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/727/727225.png">

    <!-- PWA Manifest（安卓也能全屏） -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIuW8oOeUqOWbvjwxCiwKICAic2hvcnRfbmFtZSI6ICLlvJ7mnIwiLAogICJzdGFydF91cmwiOiAiLiIsCgkgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCgkgInRoZW1lX2NvbG9yIjogIiMwMDdBQUYiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMxODIxMkEiLAogICJpY29ucyI6WwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vY2RuLmljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzcyNy83MjcyMjUucG5nIiwKICAgICAgInNpemVzIjogIjE5MngxOTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmcIiKAgICAgfQogIF0KfQ==">

    <title>本地小说音频播放器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
        body{
            background:#18181A;color:white;min-height:100vh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .container{max-width:400px;margin:0 auto;padding:20px}
        header{text-align:center;padding:20px 0;font-size:18px;font-weight:600}
        .upload-area{border:2px dashed #444;border-radius:12px;padding:40px 20px;text-align:center;margin:30px 0}
        .btn{background:#007AFF;color:white;border:none;padding:14px 24px;border-radius:30px;font-size:16px;width:100%;margin:10px 0}
        .file-list{margin-top:20px}
        .item{background:#2C2C2E;padding:14px;border-radius:10px;margin-bottom:10px}
        .item .name{font-size:14px;margin-bottom:4px}
        .item .time{font-size:12px;color:#8E8E93}
        .controls{display:flex;justify-content:center;gap:20px;margin:30px 0}
        .control-btn{width:50px;height:50px;border-radius:50%;background:#007AFF;color:white;display:flex;align-items:center;justify-content:center;border:none}
        .progress{width:100%;height:6px;background:#3A3A3C;border-radius:3px;margin:20px 0}
        .progress-bar{height:100%;background:#007AFF;width:0;border-radius:3px}
        input[type="file"]{display:none}
    </style>
</head>
<body>
    <div class="container">
        <header>本地小说音频播放器</header>

        <div class="upload-area" id="drop">
            <p>点击下方选择音频文件</p>
        </div>

        <label for="file">
            <div class="btn">选择音频文件</div>
        </label>
        <input type="file" id="file" accept="audio/*" multiple>

        <div class="progress">
            <div class="progress-bar" id="bar"></div>
        </div>

        <div class="controls">
            <button class="control-btn" id="prev">⏪</button>
            <button class="control-btn" id="play">▶️</button>
            <button class="control-btn" id="next">⏩</button>
        </div>

        <div class="file-list" id="list"></div>
    </div>

    <script>
        let audio = new Audio()
        let files = []
        let current = 0
        let isPlaying = false

        file.onchange = e => {
            files = Array.from(e.target.files)
            render()
            if(files.length>0) load(0)
        }

        function render(){
            list.innerHTML = ""
            files.forEach((f,i)=>{
                let div = document.createElement("div")
                div.className = "item"
                div.innerHTML = `
                    <div class="name">${f.name}</div>
                    <div class="time">${i===current?"正在播放":""}</div>
                `
                div.onclick = ()=>load(i)
                list.appendChild(div)
            })
        }

        function load(i){
            current = i
            let url = URL.createObjectURL(files[i])
            audio.src = url
            audio.play()
            isPlaying = true
            play.innerHTML = "⏸️"
            render()
        }

        play.onclick = ()=>{
            if(files.length===0)return
            if(isPlaying){audio.pause();play.innerHTML="▶️";isPlaying=false}
            else{audio.play();play.innerHTML="⏸️";isPlaying=true}
        }

        next.onclick = ()=>{
            if(current<files.length-1) load(current+1)
        }
        prev.onclick = ()=>{
            if(current>0) load(current-1)
        }

        audio.ontimeupdate = ()=>{
            let p = (audio.currentTime/audio.duration)*100
            bar.style.width = p+"%"
        }
        audio.onended = ()=>{
            if(current<files.length-1) load(current+1)
        }
    </script>
</body>
</html>
