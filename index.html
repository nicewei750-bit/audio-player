<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频播放器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family: -apple-system, BlinkMacSystemFont, sans-serif}
        body{background:#111;color:white;padding:20px;max-width:400px;margin:0 auto}
        h1{font-size:20px;margin-bottom:20px;text-align:center}
        .btn{background:#007AFF;color:white;padding:14px;border-radius:12px;text-align:center;margin:20px 0}
        input{display:none}
        .list{margin-top:20px}
        .item{background:#222;padding:12px;border-radius:8px;margin-bottom:10px}
        audio{width:100%;margin-top:10px}
    </style>
</head>
<body>
    <h1>本地音频播放器</h1>

    <label for="f">
        <div class="btn">选择音频文件</div>
    </label>
    <input type="file" id="f" accept="audio/*" multiple>

    <div class="list" id="list"></div>

    <script>
        f.onchange = function(){
            let files = Array.from(this.files)
            list.innerHTML = ""
            files.forEach(file => {
                let url = URL.createObjectURL(file)
                let item = document.createElement("div")
                item.className = "item"
                item.innerHTML = `
                    <div>${file.name}</div>
                    <audio controls src="${url}"></audio>
                `
                list.appendChild(item)
            })
        }
    </script>
</body>
</html>
