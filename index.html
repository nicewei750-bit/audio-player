<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>磁带播放器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
        body{background:#18181A;color:white;height:100vh;display:flex;flex-direction:column}

        .top{text-align:center;padding:15px 0;font-size:18px}

        .cassette-area{
            flex:1;
            display:flex;
            align-items:center;
            justify-content:center;
            flex-direction:column;
            gap:30px;
        }

        .cassette{
            width:280px;
            height:280px;
            background:#2C2C2E;
            border-radius:30px;
            position:relative;
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:0 0 30px #000;
        }
        .wheel{
            width:90px;
            height:90px;
            background:#111;
            border-radius:50%;
            position:relative;
            border:6px solid #007AFF;
            animation:none;
        }
        .wheel::after{
            content:'';
            width:20px;
            height:20px;
            background:#007AFF;
            border-radius:50%;
            position:absolute;
            top:50%;left:50%;
            transform:translate(-50%,-50%);
        }
        .wheel.play{
            animation:rotate 3s linear infinite;
        }
        @keyframes rotate{
            from{transform:rotate(0deg)}
            to{transform:rotate(360deg)}
        }

        .progress-box{width:80%;margin-top:-20px}
        .time{display:flex;justify-content:space-between;font-size:14px;color:#aaa;margin-bottom:6px}
        .progress-wrap{
            width:100%;height:6px;background:#333;border-radius:3px;
            position:relative;cursor:pointer;
        }
        .progress-bar{
            height:100%;background:#007AFF;border-radius:3px;width:0%;
            position:absolute;top:0;left:0;
        }
        .progress-dot{
            width:16px;height:16px;background:#007AFF;border-radius:50%;
            position:absolute;top:50%;transform:translate(-50%,-50%);
            left:0%;
        }

        .controls{display:flex;gap:20px;margin-top:10px}
        .ctrl-btn{
            width:60px;height:60px;border-radius:50%;
            background:#007AFF;color:white;border:none;font-size:20px
        }

        .speed{display:flex;gap:8px;margin-top:10px}
        .speed button{background:#333;color:white;border:none;padding:8px 10px;border-radius:8px}
        .speed .active{background:#007AFF}

        .bottom{
            padding:20px;
            display:flex;
            flex-direction:column;
            gap:10px;
        }
        .list-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:10px;
        }
        #clearBtn{
            background:#FF3B30;
            color:white;
            border:none;
            padding:6px 12px;
            border-radius:8px;
            font-size:14px;
        }
        #playlist{
            max-height:220px;
            overflow-y:auto;
        }
        .item{
            background:#2C2C2E;padding:14px;border-radius:10px;
            margin-bottom:8px;cursor:pointer;
        }
        .item.active{background:#007AFF}

        #selectBtn{
            width:100%;
            background:#007AFF;
            color:white;
            border:none;
            padding:18px;
            border-radius:30px;
            font-size:16px;
            margin-top:auto;
        }

        input{display:none}
    </style>
</head>
<body>

<div class="top">本地磁带播放器</div>

<div class="cassette-area">
    <div class="cassette">
        <div class="wheel" id="wheel"></div>
    </div>

    <div class="progress-box">
        <div class="time">
            <span id="curr">00:00</span>
            <span id="dur">00:00</span>
        </div>
        <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar" id="bar"></div>
            <div class="progress-dot" id="dot"></div>
        </div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" id="prev">⏮️</button>
        <button class="ctrl-btn" id="play">▶️</button>
        <button class="ctrl-btn" id="next">⏭️</button>
    </div>

    <div class="speed">
        <button class="active" data-s="0.5">0.5x</button>
        <button data-s="0.75">0.75x</button>
        <button data-s="1">1x</button>
        <button data-s="1.5">1.5x</button>
        <button data-s="2">2x</button>
    </div>
</div>

<div class="bottom">
    <div class="list-header">
        <h3>播放列表</h3>
        <button id="clearBtn">一键清空</button>
    </div>
    <div id="playlist"></div>
    <button id="selectBtn">选择音频文件（可多选）</button>
    <input type="file" id="fileInput" accept=".mp3,.m4a,.wav,.aac" multiple>
</div>

<script>
const audio = new Audio();
let files = [];
let currIndex = 0;

const wheel = document.getElementById('wheel');
const playBtn = document.getElementById('play');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const progressWrap = document.getElementById('progressWrap');
const bar = document.getElementById('bar');
const dot = document.getElementById('dot');
const currText = document.getElementById('curr');
const durText = document.getElementById('dur');
const playlist = document.getElementById('playlist');
const selectBtn = document.getElementById('selectBtn');
const fileInput = document.getElementById('fileInput');
const clearBtn = document.getElementById('clearBtn');

// ==============================================
// 🔥 核心：打开软件 → 自动加载上次的列表和进度
// ==============================================
window.addEventListener('load', () => {
    loadFromLocal();
});

// ==============================================
// 🔥 保存播放列表到本地
// ==============================================
function saveListToLocal() {
    const list = files.map(f => ({ name: f.name }));
    localStorage.setItem('playlist', JSON.stringify(list));
}

// ==============================================
// 🔥 保存播放进度（第几首 + 第几秒）
// ==============================================
function saveProgressToLocal() {
    localStorage.setItem('lastIndex', currIndex);
    localStorage.setItem('lastTime', audio.currentTime);
}

// ==============================================
// 🔥 从本地读取所有数据
// ==============================================
function loadFromLocal() {
    const list = localStorage.getItem('playlist');
    const lastIdx = localStorage.getItem('lastIndex');
    const lastTime = localStorage.getItem('lastTime');

    if (list) {
        try {
            const parsed = JSON.parse(list);
            files = parsed.map(item => new File([], item.name));
            renderList();
        } catch (e) {}
    }

    if (lastIdx !== null && files.length > 0) {
        currIndex = Number(lastIdx);
        setTimeout(() => {
            if (lastTime) audio.currentTime = Number(lastTime);
            renderList();
        }, 300);
    }
}

// 选择文件（自动排序）
selectBtn.onclick = () => fileInput.click();
fileInput.onchange = (e) => {
    files = Array.from(e.target.files).sort((a, b) => {
        return a.name.localeCompare(b.name, undefined, { numeric: true });
    });
    saveListToLocal();
    renderList();
    if (files.length) playIndex(0);
};

// 一键清空（同时清除本地保存）
clearBtn.onclick = () => {
    audio.pause();
    audio.src = '';
    files = [];
    currIndex = 0;
    playBtn.innerText = '▶️';
    wheel.classList.remove('play');
    bar.style.width = '0%';
    dot.style.left = '0%';
    currText.innerText = '00:00';
    durText.innerText = '00:00';
    localStorage.clear();
    renderList();
};

// 渲染列表
function renderList() {
    playlist.innerHTML = '';
    files.forEach((f, i) => {
        let div = document.createElement('div');
        div.className = 'item' + (i === currIndex ? ' active' : '');
        div.innerText = f.name;
        div.onclick = () => playIndex(i);
        playlist.appendChild(div);
    });
}

// 播放
function playIndex(i) {
    currIndex = i;
    audio.src = URL.createObjectURL(files[i]);
    audio.play();
    playBtn.innerText = '⏸️';
    wheel.classList.add('play');
    saveProgressToLocal();
    renderList();
}

// 播放/暂停
playBtn.onclick = () => {
    if (!files.length) return;
    if (audio.paused) {
        audio.play();
        playBtn.innerText = '⏸️';
        wheel.classList.add('play');
    } else {
        audio.pause();
        playBtn.innerText = '▶️';
        wheel.classList.remove('play');
    }
};

// 上一曲
prevBtn.onclick = () => {
    if (currIndex > 0) playIndex(currIndex - 1);
};

// 下一曲
nextBtn.onclick = () => {
    if (currIndex < files.length - 1) playIndex(currIndex + 1);
};

// 进度条同步
audio.ontimeupdate = () => {
    if (!audio.duration) return;
    const per = (audio.currentTime / audio.duration) * 100;
    bar.style.width = per + '%';
    dot.style.left = per + '%';
    currText.innerText = fmt(audio.currentTime);
    durText.innerText = fmt(audio.duration);
    saveProgressToLocal();
};

// 点击进度条跳转
progressWrap.onclick = (e) => {
    if (!audio.duration) return;
    const rect = progressWrap.getBoundingClientRect();
    const per = (e.clientX - rect.left) / rect.width;
    audio.currentTime = per * audio.duration;
};

// 自动下一曲
audio.onended = () => {
    if (currIndex < files.length - 1) {
        playIndex(currIndex + 1);
    } else {
        playBtn.innerText = '▶️';
        wheel.classList.remove('play');
    }
};

// 倍速
document.querySelectorAll('.speed button').forEach(b => {
    b.onclick = () => {
        document.querySelectorAll('.speed button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        audio.playbackRate = parseFloat(b.dataset.s);
    };
});

function fmt(t) {
    if (isNaN(t)) return '00:00';
    const m = Math.floor(t / 60);
    const s = Math.floor(t % 60);
    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}
</script>
</body>
</html>
