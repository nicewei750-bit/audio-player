<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>磁带播放器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
        body{background:#18181A;color:white;height:100vh;display:flex;flex-direction:column}

        /* 顶部标题 */
        .top{text-align:center;padding:15px 0;font-size:18px}

        /* 中间：磁带播放区域 */
        .cassette-area{
            flex:1;
            display:flex;
            align-items:center;
            justify-content:center;
            flex-direction:column;
            gap:30px;
        }

        /* 大磁带样式 */
        .cassette{
            width:280px;
            height:280px;
            background:#2C2C2E;
            border-radius:30px;
            position:relative;
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:0 0 30px rgba(0,0,0,0.5);
        }
        .wheel{
            width:90px;
            height:90px;
            background:#111;
            border-radius:50%;
            position:relative;
            border:6px solid #007AFF;
            animation:none;
        }
        .wheel::after{
            content:'';
            width:20px;
            height:20px;
            background:#007AFF;
            border-radius:50%;
            position:absolute;
            top:50%;left:50%;
            transform:translate(-50%,-50%);
        }
        .wheel.play{
            animation:rotate 3s linear infinite;
        }
        @keyframes rotate{
            from{transform:rotate(0deg)}
            to{transform:rotate(360deg)}
        }

        /* 进度条 */
        .progress-box{width:80%;margin-top:-20px}
        .time{display:flex;justify-content:space-between;font-size:14px;color:#aaa;margin-bottom:6px}
        .progress-wrap{
            width:100%;height:6px;background:#333;border-radius:3px;
            position:relative;cursor:pointer;
        }
        .progress-bar{
            height:100%;background:#007AFF;border-radius:3px;width:0%;
            position:absolute;top:0;left:0;
        }
        .progress-dot{
            width:16px;height:16px;background:#007AFF;border-radius:50%;
            position:absolute;top:50%;transform:translate(-50%,-50%);
            left:0%;
        }

        /* 控制按钮 */
        .controls{display:flex;gap:20px;margin-top:10px}
        .ctrl-btn{
            width:60px;height:60px;border-radius:50%;
            background:#007AFF;color:white;border:none;font-size:20px
        }

        /* 倍速 */
        .speed{display:flex;gap:8px;margin-top:10px}
        .speed button{background:#333;color:white;border:none;padding:8px 10px;border-radius:8px}
        .speed .active{background:#007AFF}

        /* 底部：播放列表 + 选择文件 */
        .bottom{
            padding:20px;
            display:flex;
            flex-direction:column;
            gap:10px;
        }
        #playlist{
            max-height:220px;
            overflow-y:auto;
        }
        .item{
            background:#2C2C2E;padding:14px;border-radius:10px;
            margin-bottom:8px;cursor:pointer;
        }
        .item.active{background:#007AFF}

        /* 底部多选按钮 */
        #selectBtn{
            width:100%;
            background:#007AFF;
            color:white;
            border:none;
            padding:18px;
            border-radius:30px;
            font-size:16px;
            margin-top:auto;
        }

        input{display:none}
        audio{display:none}
    </style>
</head>
<body>

    <div class="top">本地磁带播放器</div>

    <!-- 正确闭合的audio标签 -->
    <audio id="audio">
        <source id="audioSource" src="" type="audio/mpeg">
    

    <!-- 中间：磁带区域 -->
    <div class="cassette-area">
        <div class="cassette">
            <div class="wheel" id="wheel"></div>
        </div>

        <div class="progress-box">
            <div class="time">
                <span id="curr">00:00</span>
                <span id="dur">00:00</span>
            </div>
            <div class="progress-wrap" id="progressWrap">
                <div class="progress-bar" id="bar"></div>
                <div class="progress-dot" id="dot"></div>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="prev">⏮️</button>
            <button class="ctrl-btn" id="play">▶️</button>
            <button class="ctrl-btn" id="next">⏭️</button>
        </div>

        <div class="speed">
            <button class="active" data-s="0.5">0.5x</button>
            <button data-s="0.75">0.75x</button>
            <button data-s="1">1x</button>
            <button data-s="1.5">1.5x</button>
            <button data-s="2">2x</button>
        </div>
    </div>

    <!-- 底部：播放列表 + 选择文件 -->
    <div class="bottom">
        <div id="playlist"></div>
        <button id="selectBtn">选择音频文件（可多选）</button>
        <input type="file" id="fileInput" accept="audio/*" multiple>
    </div>

<script>
    const audio = document.getElementById('audio');
    const audioSource = document.getElementById('audioSource');
    let files = [];
    let currIndex = 0;
    let isPlaying = false;

    const wheel = document.getElementById('wheel');
    const playBtn = document.getElementById('play');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const progressWrap = document.getElementById('progressWrap');
    const bar = document.getElementById('bar');
    const dot = document.getElementById('dot');
    const currText = document.getElementById('curr');
    const durText = document.getElementById('dur');
    const playlist = document.getElementById('playlist');
    const selectBtn = document.getElementById('selectBtn');
    const fileInput = document.getElementById('fileInput');

    // 选择文件
    selectBtn.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
        files = Array.from(e.target.files);
        renderList();
        if(files.length > 0) {
            loadIndex(currIndex, false);
        }
    });

    // 播放列表
    function renderList(){
        playlist.innerHTML = '';
        files.forEach((f,i)=>{
            let div = document.createElement('div');
            div.className = 'item' + (i === currIndex ? ' active' : '');
            div.innerText = f.name;
            div.addEventListener('click', () => {
                loadIndex(i, true);
            });
            playlist.appendChild(div);
        });
    }

    // 加载指定索引的音频
    function loadIndex(i, autoPlay) {
        if (!files.length) return;
        currIndex = i;
        const url = URL.createObjectURL(files[i]);
        
        // 修复iOS mp3播放问题
        audioSource.src = url;
        audio.load();
        
        if (autoPlay) {
            audio.play().then(() => {
                isPlaying = true;
                playBtn.innerText = '⏸️';
                wheel.classList.add('play');
            }).catch(err => {
                isPlaying = false;
                playBtn.innerText = '▶️';
                wheel.classList.remove('play');
            });
        } else {
            isPlaying = false;
            playBtn.innerText = '▶️';
            wheel.classList.remove('play');
        }
        
        renderList();
    }

    // 播放暂停
    playBtn.addEventListener('click', () => {
        if (!files.length) return;
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            playBtn.innerText = '▶️';
            wheel.classList.remove('play');
        } else {
            audio.play().then(() => {
                isPlaying = true;
                playBtn.innerText = '⏸️';
                wheel.classList.add('play');
            });
        }
    });

    // 上下曲
    prevBtn.addEventListener('click', () => {
        if (currIndex > 0) {
            loadIndex(currIndex - 1, true);
        }
    });

    nextBtn.addEventListener('click', () => {
        if (currIndex < files.length - 1) {
            loadIndex(currIndex + 1, true);
        }
    });

    // 进度条
    audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        let per = (audio.currentTime / audio.duration) * 100;
        bar.style.width = per + '%';
        dot.style.left = per + '%';
        currText.innerText = fmt(audio.currentTime);
        durText.innerText = fmt(audio.duration);
    });

    // 点击跳转
    progressWrap.addEventListener('click', (e) => {
        let rect = progressWrap.getBoundingClientRect();
        let per = (e.clientX - rect.left) / rect.width;
        audio.currentTime = per * audio.duration;
    });

    // 自动下一曲
    audio.addEventListener('ended', () => {
        if (currIndex < files.length - 1) {
            loadIndex(currIndex + 1, true);
        } else {
            isPlaying = false;
            playBtn.innerText = '▶️';
            wheel.classList.remove('play');
        }
    });

    // 倍速
    document.querySelectorAll('.speed button').forEach(b => {
        b.addEventListener('click', () => {
            document.querySelectorAll('.speed button').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            audio.playbackRate = parseFloat(b.dataset.s);
        });
    });

    function fmt(t) {
        if (isNaN(t)) return '00:00';
        let m = Math.floor(t / 60);
        let s = Math.floor(t % 60);
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }
</script>
</body>
</html>
